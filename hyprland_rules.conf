# Hyprland window rules for screen-board overlay app
# You can source this file in your ~/.config/hypr/hyprland.conf using:
# source = /run/media/kanhaji/New Volume/randoms/screen-board/hyprland_rules.conf

windowrulev2 = float, class:^(screen_board)$
windowrulev2 = pin, class:^(screen_board)$
windowrulev2 = fullscreen, class:^(screen_board)$
windowrulev2 = noborder, class:^(screen_board)$
windowrulev2 = noshadow, class:^(screen_board)$
windowrulev2 = noblur, class:^(screen_board)$
windowrulev2 = nodim, class:^(screen_board)$
