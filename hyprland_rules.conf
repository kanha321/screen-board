# Hyprland window rules for screen-board overlay app
# Sourced via: source = /home/kanhaji/.config/hypr/screen-board-rules.conf

windowrule = float on, match:class ^(screen_board)$
windowrule = pin on, match:class ^(screen_board)$
windowrule = fullscreen on, match:class ^(screen_board)$
windowrule = noborder on, match:class ^(screen_board)$
windowrule = noshadow on, match:class ^(screen_board)$
windowrule = noblur on, match:class ^(screen_board)$
windowrule = nodim on, match:class ^(screen_board)$
